<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ziselin</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f3efe6;
      --paper-light: #fbf8f1;
      --panel: rgba(255, 253, 248, 0.72);
      --panel-solid: rgba(255, 254, 250, 0.9);
      --ink: #213633;
      --ink-soft: #3d504c;
      --muted: #7a837d;
      --quiet: rgba(33, 54, 51, 0.48);
      --line: rgba(33, 54, 51, 0.14);
      --line-strong: rgba(33, 54, 51, 0.26);
      --shadow: rgba(33, 54, 51, 0.1);
      --shadow-soft: rgba(33, 54, 51, 0.055);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.72), transparent 38%),
        linear-gradient(145deg, var(--paper-light) 0%, var(--paper) 58%, #e8e2d8 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        repeating-linear-gradient(0deg, rgba(33, 54, 51, 0.018) 0 1px, transparent 1px 8px),
        repeating-linear-gradient(90deg, rgba(33, 54, 51, 0.014) 0 1px, transparent 1px 12px);
      opacity: 0.56;
      pointer-events: none;
    }

    a {
      color: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: center;
      height: 82px;
      min-height: 82px;
      padding: 18px 18px 10px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(250, 247, 239, 0.84);
      box-shadow: 0 10px 30px rgba(33, 54, 51, 0.035);
      backdrop-filter: blur(16px);
    }

    .brand-plate {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      align-self: stretch;
      height: 54px;
      min-height: 54px;
      padding: 0 12px;
      z-index: 1;
    }

    .brand-mark {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      z-index: 2;
      overflow: visible;
    }

    .home-menu-button {
      width: 36px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      pointer-events: none;
    }

    .home-menu-button img {
      display: block;
      width: 28px;
      height: 28px;
      opacity: 0.94;
    }

    .brand-bird {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(20%) sepia(18%) saturate(673%) hue-rotate(122deg) brightness(92%) contrast(90%);
      opacity: 0.93;
    }

    .brand-name {
      color: var(--ink);
      font-size: clamp(1.32rem, 2.05vw, 1.82rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .topbar-search {
      display: flex;
      justify-content: flex-end;
      padding: 0;
      flex: 1 1 auto;
    }

    .search-wrap {
      position: relative;
      width: min(460px, 100%);
    }

    .search-wrap::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 50%;
      width: 18px;
      height: 18px;
      background: var(--muted);
      mask: url("https://api.iconify.design/material-symbols/search-rounded.svg") center / contain no-repeat;
      transform: translateY(-50%);
      opacity: 0.86;
      pointer-events: none;
    }

    .app-search {
      width: 100%;
      height: 43px;
      padding: 0 16px 0 44px;
      border: 1px solid rgba(33, 54, 51, 0.15);
      border-radius: 10px;
      color: var(--ink);
      background: rgba(255, 254, 250, 0.88);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78), 0 9px 20px rgba(33, 54, 51, 0.06);
      font: inherit;
      font-size: 0.94rem;
    }

    .app-search:focus {
      border-color: var(--line-strong);
      outline: none;
      box-shadow: 0 0 0 3px rgba(33, 54, 51, 0.1), 0 12px 28px rgba(33, 54, 51, 0.075);
    }

    .page-shell {
      width: min(1180px, calc(100vw - 56px));
      margin: 0 auto;
      padding: clamp(68px, 9vw, 116px) 0 48px;
    }

    .hero {
      display: grid;
      justify-items: start;
      margin: 0 auto clamp(92px, 13vw, 150px);
      width: min(840px, 100%);
    }

    .claim-text {
      margin: 0;
      color: var(--ink-soft);
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(4rem, 7vw, 6.85rem);
      font-weight: 700;
      line-height: 1.03;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .app-section {
      width: min(840px, 100%);
      margin: 0 auto;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: max-content;
      gap: 46px;
      justify-content: start;
      align-items: start;
    }

    .app-tile {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 10px;
      width: max-content;
      max-width: 120px;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      text-decoration: none;
      transition: transform 160ms ease;
    }

    .app-tile:hover,
    .app-tile:focus-visible {
      outline: none;
      transform: translateY(-2px);
    }

    .app-tile:focus-visible .app-icon {
      box-shadow: 0 0 0 3px rgba(33, 54, 51, 0.12), 0 10px 24px rgba(33, 54, 51, 0.16);
    }

    .app-icon {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 10px 24px rgba(33, 54, 51, 0.15);
      transition: box-shadow 160ms ease, transform 160ms ease;
    }

    .app-tile:hover .app-icon {
      box-shadow: 0 14px 30px rgba(33, 54, 51, 0.2);
      transform: scale(1.03);
    }

    .app-title {
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0;
      text-align: center;
    }

    .app-placeholder {
      min-height: 88px;
    }

    .empty-state {
      display: none;
      grid-column: 1 / -1;
      padding: 20px;
      border: 1px dashed rgba(33, 54, 51, 0.22);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 254, 250, 0.5);
      text-align: center;
    }

    .collection-grid.has-no-results .empty-state {
      display: block;
    }

    [data-search-card][hidden] {
      display: none;
    }

    @media (max-width: 960px) {
      .topbar {
        flex-wrap: wrap;
        height: auto;
        min-height: 82px;
      }

      .topbar-search {
        justify-content: stretch;
        padding: 0 18px 14px;
      }

      .page-shell {
        padding-top: 52px;
      }

      .hero {
        margin-bottom: 70px;
      }

      .claim-text {
        font-size: clamp(3.2rem, 12vw, 5.4rem);
      }

      .collection-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .page-shell {
        width: min(100% - 28px, 1180px);
        padding-top: 42px;
      }

      .brand-plate {
        padding: 0 12px;
      }

      .brand-bird {
        width: 48px;
        height: 48px;
      }

      .brand-name {
        font-size: clamp(1.32rem, 2.05vw, 1.82rem);
      }

      .claim-text {
        font-size: clamp(2.65rem, 14vw, 4.25rem);
      }

      .app-tile,
      .app-placeholder {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand-plate" aria-label="Ziselin">
      <span class="home-menu-button" aria-hidden="true">
        <img src="https://api.iconify.design/material-symbols/menu.svg?color=%23213633" alt="">
      </span>
      <div class="brand-mark">
        <img class="brand-bird" src="./assets/ziselin-bild-flach.svg" alt="" aria-hidden="true">
        <span class="brand-name">ziselin</span>
      </div>
    </div>
    <div class="topbar-search">
      <div class="search-wrap">
        <input class="app-search" type="search" list="appSearchOptions" placeholder="Apps durchsuchen" aria-label="Apps durchsuchen" autocomplete="off">
      </div>
      <datalist id="appSearchOptions">
        <option value="TimeMap"></option>
      </datalist>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero">
      <h1 class="claim-text">Digital Tools for Analogue People</h1>
    </section>

    <section class="app-section" aria-label="App-Sammlungen">
      <div class="collection-grid">
        <a class="app-tile" href="./timemap/index.html" data-search-card data-app-link data-search-text="timemap atlas zeitstrahl timeline quellen charts kalender maps">
          <img class="app-icon" src="./assets/timemap-app-icon.jpg" alt="" aria-hidden="true">
          <span class="app-title">TimeMap</span>
        </a>
        <p class="empty-state" data-empty-state>Keine passende App gefunden.</p>
      </div>
    </section>
  </main>

  <script>
    const appSearch = document.querySelector(".app-search");
    const collectionGrid = document.querySelector(".collection-grid");
    const collectionCards = [...document.querySelectorAll("[data-search-card]")];

    function normalizeSearch(value) {
      return value.trim().toLowerCase();
    }

    function runSearch() {
      const query = normalizeSearch(appSearch?.value ?? "");
      let visibleCount = 0;

      collectionCards.forEach((card) => {
        const text = normalizeSearch(card.dataset.searchText ?? card.textContent ?? "");
        const isVisible = !query || text.includes(query);
        card.hidden = !isVisible;
        if (isVisible) {
          visibleCount += 1;
        }
      });

      collectionGrid?.classList.toggle("has-no-results", visibleCount === 0);
    }

    appSearch?.addEventListener("input", runSearch);

    function openTimeMap() {
      window.location.href = "./timemap/index.html";
    }

    document.querySelectorAll("[data-app-link]").forEach((link) => {
      link.addEventListener("click", (event) => {
        if (event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
          return;
        }
        event.preventDefault();
        openTimeMap();
      });
    });

    appSearch?.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") {
        return;
      }

      event.preventDefault();
      const query = normalizeSearch(appSearch.value);
      if (query === "timemap") {
        openTimeMap();
      }
    });
  </script>
</body>
</html>
